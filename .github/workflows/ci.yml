name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      web:
        image: node:20-alpine
        ports:
          - 3000:3000
        options: >-
          --entrypoint sh
          -c "npm install && npm run dev"

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: E2E tests
        env:
          # ensure dev server is reachable
          CI: true
        run: |
          npm run test:e2e

      - name: Lighthouse performance audit
        run: |
          npm install -g lighthouse@11
          # run against local server
          npx lighthouse http://localhost:3000 --quiet --chrome-flags="--no-sandbox" --output=json --output-path=./lhreport.json || true
          cat lhreport.json | jq '.categories.performance.score' || true
