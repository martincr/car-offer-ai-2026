name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Start server
        run: npm run start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E tests
        env:
          CI: true
        run: npm run test:e2e

      - name: Lighthouse performance audit
        run: |
          npm install -g lighthouse@11
          npx lighthouse http://localhost:3000 --quiet --chrome-flags="--no-sandbox" --output=json --output-path=./lhreport.json || true
          cat lhreport.json | jq '.categories.performance.score' || true
